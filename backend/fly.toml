app = "lingering-moon-9343"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  FRONTEND_URL = "*"
  BINANCE_TESTNET = "True"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "python -m app.workers.signal_worker"
  market = "python -m app.services.websocket_listener"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
