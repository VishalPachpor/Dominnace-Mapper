upstream api_cluster {
    server api:8000;
    # When scaling: docker-compose -f docker-compose.prod.yml up --scale api=4
    # Nginx auto-discovers replicas via Docker DNS
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name api.dominancebot.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;


    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running trade operations
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Webhook endpoint — separate rate limit (TradingView sends bursts)
    location /api/webhook {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Stripe webhook — no rate limit (Stripe controls the flow)
    location /billing/webhook {
        proxy_pass http://api_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Stripe-Signature $http_stripe_signature;
    }

    # Health check endpoint for monitoring
    location /health {
        proxy_pass http://api_cluster;
        access_log off;
    }
}
