version: '3.8'

services:
  # ──────────────────────────────────────────────
  # Nginx Reverse Proxy / Load Balancer
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: always

  # ──────────────────────────────────────────────
  # FastAPI API Server (scalable)
  # Scale with: docker-compose -f docker-compose.prod.yml up --scale api=4
  # ──────────────────────────────────────────────
  api:
    build: .
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────
  # Signal Worker (scalable)
  # Scale with: docker-compose -f docker-compose.prod.yml up --scale worker=8
  # ──────────────────────────────────────────────
  worker:
    build: .
    command: python -m app.workers.signal_worker
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
    restart: always

  # ──────────────────────────────────────────────
  # WebSocket Market Data Service
  # ──────────────────────────────────────────────
  market-data:
    build: .
    command: python -m app.services.websocket_listener
    env_file:
      - .env.production
    depends_on:
      - redis
    restart: always

  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-tradingbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  # ──────────────────────────────────────────────
  # Redis Queue
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
  redisdata:
